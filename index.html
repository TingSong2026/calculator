<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --panel: #2a2a3c;
      --display: #12121c;
      --key: #3a3a4f;
      --key-op: #f4a261;
      --key-eq: #2a9d8f;
      --key-clear: #e76f51;
      --text: #f5f5f5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .calculator {
      width: 320px;
      background: var(--panel);
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    .display {
      background: var(--display);
      color: var(--text);
      font-size: 2rem;
      text-align: right;
      padding: 20px 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      min-height: 72px;
      word-break: break-all;
      overflow-wrap: anywhere;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 18px 0;
      font-size: 1.25rem;
      color: var(--text);
      background: var(--key);
      cursor: pointer;
      transition: filter 0.15s ease;
    }

    button:hover { filter: brightness(1.15); }
    button:active { filter: brightness(0.9); }

    .op { background: var(--key-op); color: #1e1e2e; }
    .equals { background: var(--key-eq); grid-column: span 2; }
    .clear { background: var(--key-clear); }
    .span-2 { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="keys">
      <button class="clear" data-action="clear">C</button>
      <button data-value="(">(</button>
      <button data-value=")">)</button>
      <button class="op" data-value="/">&divide;</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="op" data-value="*">&times;</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="op" data-value="-">&minus;</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="op" data-value="+">+</button>

      <button class="span-2" data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="equals" data-action="equals">=</button>
    </div>
  </div>

  <script src="calculator.js"></script>
</body>
</html>
